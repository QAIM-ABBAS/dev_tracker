# syntax=docker/compose
# --------------------------------------------------------------------------- #
# ProjectFlow — unified docker-compose for PostgreSQL + FastAPI + React       #
# --------------------------------------------------------------------------- #
# Bring everything up:        docker compose up --build
# Tear down (keep volumes):   docker compose down
# Tear down (wipe data):      docker compose down -v
# View backend logs:          docker compose logs -f backend
# --------------------------------------------------------------------------- #

services:
  db:
    image: postgres:16-alpine
    container_name: projectflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-projectflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-projectflow}
      POSTGRES_DB: ${POSTGRES_DB:-projectflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-projectflow} -d ${POSTGRES_DB:-projectflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - projectflow

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projectflow-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-projectflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-projectflow}
      POSTGRES_DB: ${POSTGRES_DB:-projectflow}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DEBUG: "true"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000","http://localhost:8080","http://127.0.0.1:5173"]'
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-change-me-in-production}
    ports:
      - "8000:8000"
    networks:
      - projectflow

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projectflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - projectflow

volumes:
  pgdata:

networks:
  projectflow:
    driver: bridge
